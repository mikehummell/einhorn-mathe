<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🐉 Kokosnuss lernt Farben!</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{
  --green:#4caf50;--dgreen:#2e7d32;--lgreen:#c8e6c9;
  --orange:#ff9800;--yellow:#fdd835;--red:#e53935;
  --blue:#1e88e5;--purple:#9c27b0;--pink:#e91e8c;
  --mint:#26c6da;--brown:#795548;--dark:#1a2a1a;
  --bg1:#e8f5e9;--bg2:#f1f8e9;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
html,body{height:100%;}
body{font-family:'Fredoka One',cursive;
  background:linear-gradient(160deg,#c8e6c9 0%,#e8f5e9 40%,#fff9c4 100%);
  min-height:100vh;overflow-x:hidden;overflow-y:auto;}

/* floating leaves */
.leaf{position:fixed;font-size:1.4rem;animation:leafDrift var(--ld) ease-in-out infinite alternate;
  z-index:0;pointer-events:none;opacity:.5;}
@keyframes leafDrift{from{transform:translate(0,0) rotate(-10deg)}to{transform:translate(15px,20px) rotate(10deg)}}

/* ── WRAP ── */
.wrap{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;
  padding:14px 14px 32px;gap:12px;max-width:460px;margin:0 auto;min-height:100vh;}

/* HEADER */
.header{text-align:center;}
.title{font-size:clamp(1.8rem,7vw,2.6rem);color:var(--dgreen);
  text-shadow:3px 3px 0 rgba(46,125,50,.2);line-height:1;}
.subtitle{font-family:'Nunito',sans-serif;font-weight:800;font-size:.85rem;
  color:#558b2f;margin-top:2px;}

/* LEVEL DOTS */
.level-dots{display:flex;gap:6px;justify-content:center;}
.ld{width:13px;height:13px;border-radius:50%;background:rgba(255,255,255,.4);
  border:2px solid rgba(76,175,80,.3);transition:all .3s;}
.ld.done{background:var(--yellow);border-color:var(--orange);}
.ld.active{background:var(--green);border-color:var(--dgreen);transform:scale(1.3);}

/* DRAGON STAGE */
.dragon-stage{position:relative;width:100%;max-width:300px;height:200px;
  display:flex;align-items:center;justify-content:center;}
.dragon-wrap{width:180px;height:180px;
  filter:drop-shadow(0 6px 20px rgba(76,175,80,.35));
  animation:dragonFloat 3s ease-in-out infinite;}
.dragon-wrap svg{width:100%;height:100%;overflow:visible;}
@keyframes dragonFloat{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-10px) rotate(1deg)}}
@keyframes dragonDance{0%{transform:rotate(-12deg)}25%{transform:rotate(12deg) translateY(-10px)}50%{transform:rotate(-8deg)}75%{transform:rotate(10deg) translateY(-8px)}100%{transform:rotate(0)}}
@keyframes dragonSad{0%,100%{transform:rotate(0)}30%{transform:rotate(-5deg)}70%{transform:rotate(5deg)}}
@keyframes popIn{from{transform:scale(.3);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes correctPop{0%{transform:scale(1)}50%{transform:scale(1.14)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

/* SPEECH */
.speech{position:absolute;top:-4px;right:-16px;background:white;
  border-radius:18px 18px 18px 4px;padding:9px 14px;
  font-family:'Nunito',sans-serif;font-weight:900;font-size:.95rem;
  color:var(--dark);box-shadow:0 4px 14px rgba(0,0,0,.12);
  max-width:155px;text-align:center;line-height:1.3;
  animation:popIn .35s cubic-bezier(.34,1.56,.64,1);z-index:10;}

.upgrade-lbl{font-family:'Nunito',sans-serif;font-weight:800;font-size:.73rem;
  color:var(--dgreen);text-align:center;min-height:17px;}

/* PROGRESS */
.progress-wrap{width:100%;max-width:400px;height:11px;
  background:rgba(76,175,80,.15);border-radius:999px;overflow:hidden;}
.progress-fill{height:100%;border-radius:999px;
  background:linear-gradient(90deg,var(--green),var(--yellow));
  transition:width .6s cubic-bezier(.34,1.2,.64,1);
  box-shadow:0 0 10px rgba(76,175,80,.4);}

/* QUESTION CARD */
.question-card{background:white;border-radius:28px;padding:20px 16px;
  width:100%;max-width:400px;text-align:center;
  box-shadow:0 6px 28px rgba(76,175,80,.15),0 1px 0 rgba(255,255,255,.9) inset;}
.q-label{font-family:'Nunito',sans-serif;font-weight:900;font-size:.82rem;
  color:#558b2f;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}

/* object display */
.obj-display{display:flex;align-items:center;justify-content:center;gap:10px;margin:6px 0 14px;}
.obj-emoji{font-size:clamp(3rem,12vw,4.5rem);filter:drop-shadow(0 3px 8px rgba(0,0,0,.15));
  animation:popIn .4s cubic-bezier(.34,1.56,.64,1);}
.obj-color-swatch{width:clamp(60px,18vw,90px);height:clamp(60px,18vw,90px);
  border-radius:20px;border:4px solid rgba(0,0,0,.1);
  box-shadow:0 4px 16px rgba(0,0,0,.2);animation:popIn .4s cubic-bezier(.34,1.56,.64,1);}

/* ── COLOR ANSWER BUTTONS ── */
.color-answers{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:400px;}
.color-btn{
  border:4px solid rgba(255,255,255,.5);border-radius:22px;
  min-height:80px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
  transition:transform .15s,box-shadow .15s,border-color .15s;
  box-shadow:0 6px 20px rgba(0,0,0,.12),0 -2px 0 rgba(0,0,0,.08) inset;
  position:relative;overflow:hidden;
}
.color-btn::before{content:'';position:absolute;top:0;left:0;right:0;height:40%;
  background:rgba(255,255,255,.25);border-radius:inherit;}
.color-btn:active{transform:scale(.93);}
.color-btn:hover{transform:translateY(-4px) scale(1.04);border-color:rgba(255,255,255,.8);
  box-shadow:0 10px 28px rgba(0,0,0,.2);}
.color-btn-name{font-size:1.1rem;color:white;font-family:'Fredoka One',cursive;
  text-shadow:1px 1px 3px rgba(0,0,0,.4);z-index:1;}

.color-btn.correct{border-color:white;box-shadow:0 0 30px rgba(255,255,255,.6);
  animation:correctPop .45s cubic-bezier(.34,1.56,.64,1);}
.color-btn.wrong{animation:shake .35s ease;border-color:rgba(255,255,255,.8);}

/* checkmark overlay on correct */
.color-btn.correct::after{content:'✓';position:absolute;
  font-size:2.5rem;color:white;text-shadow:0 2px 8px rgba(0,0,0,.3);
  animation:popIn .3s cubic-bezier(.34,1.56,.64,1);}

/* CONFETTI */
.confetti-wrap{position:fixed;inset:0;pointer-events:none;z-index:200;}
.cp{position:absolute;border-radius:3px;animation:cffall var(--fd) ease-in var(--dl) forwards;opacity:0;}
@keyframes cffall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(105vh) rotate(600deg);opacity:0}}

/* LEVEL UP */
.lu-ov{position:fixed;inset:0;z-index:300;
  background:rgba(200,230,200,.92);backdrop-filter:blur(6px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:13px;padding:20px;opacity:0;pointer-events:none;transition:opacity .3s;}
.lu-ov.show{opacity:1;pointer-events:all;}
.lu-dragon{width:150px;height:150px;animation:dragonDance 1s ease-in-out infinite;}
.lu-dragon svg{width:100%;height:100%;overflow:visible;}
.lu-title{font-size:clamp(2rem,8vw,3.5rem);color:var(--dgreen);
  text-shadow:3px 3px 0 rgba(46,125,50,.2);text-align:center;
  animation:luPulse 1s ease-in-out infinite alternate;}
@keyframes luPulse{from{transform:scale(1)}to{transform:scale(1.05)}}
.lu-upgrade{background:white;border:3px solid var(--green);border-radius:16px;
  padding:10px 22px;font-family:'Nunito',sans-serif;font-weight:800;
  font-size:.95rem;color:var(--dgreen);text-align:center;}
.lu-sub{font-family:'Nunito',sans-serif;font-size:.9rem;font-weight:700;
  color:#558b2f;text-align:center;}
.lu-btn{font-size:1.4rem;padding:16px 48px;border:none;border-radius:999px;
  background:linear-gradient(135deg,var(--green),var(--dgreen));
  color:white;cursor:pointer;
  box-shadow:0 8px 24px rgba(76,175,80,.4),0 -3px 0 rgba(0,0,0,.1) inset;
  transition:transform .15s;}
.lu-btn:active{transform:scale(.95);}

/* WIN */
.win-ov{position:fixed;inset:0;z-index:400;
  background:linear-gradient(160deg,#c8e6c9,#e8f5e9,#fff9c4);
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  overflow-y:auto;padding:18px 14px 40px;gap:13px;
  opacity:0;pointer-events:none;transition:opacity .4s;}
.win-ov.show{opacity:1;pointer-events:all;}
.win-title{font-size:clamp(1.8rem,7vw,2.8rem);color:var(--dgreen);text-align:center;}
.diploma-wrap{background:white;border-radius:24px;padding:22px 18px;max-width:400px;width:100%;
  text-align:center;position:relative;border:6px solid transparent;background-clip:padding-box;}
.diploma-wrap::before{content:'';position:absolute;inset:-6px;border-radius:28px;z-index:-1;
  background:linear-gradient(135deg,#fdd835,#4caf50,#e53935,#1e88e5,#9c27b0,#fdd835);
  background-size:300% 300%;animation:rbBorder 3s linear infinite;}
@keyframes rbBorder{0%{background-position:0% 50%}100%{background-position:300% 50%}}
.dip-head{font-size:1.1rem;color:var(--dgreen);margin-bottom:3px;}
.dip-name{font-size:2.2rem;color:var(--dgreen);line-height:1.1;margin:5px 0;}
.dip-dragon{width:90px;height:90px;margin:0 auto;animation:dragonFloat 2s ease-in-out infinite;}
.dip-dragon svg{width:100%;height:100%;overflow:visible;}
.dip-text{font-family:'Nunito',sans-serif;font-weight:700;font-size:.82rem;
  color:#2e5a2e;line-height:1.6;margin:7px 0;}
.dip-stats{display:flex;justify-content:center;gap:18px;margin:7px 0;}
.dsv{font-size:1.6rem;color:var(--dgreen);}
.dsl{font-family:'Nunito',sans-serif;font-size:.62rem;color:#558b2f;
  font-weight:800;text-transform:uppercase;letter-spacing:.5px;}
.dip-seal{display:inline-flex;align-items:center;justify-content:center;
  width:58px;height:58px;border-radius:50%;
  background:linear-gradient(135deg,var(--yellow),var(--orange));
  font-size:1.5rem;border:3px solid white;
  box-shadow:0 4px 14px rgba(255,152,0,.4);margin:5px 0 3px;}
.dip-date{font-family:'Nunito',sans-serif;font-weight:700;font-size:.68rem;color:#558b2f;}
.win-btns{display:flex;flex-direction:column;gap:9px;width:100%;max-width:280px;}
.win-btn{font-size:1.1rem;padding:13px 18px;border:none;border-radius:999px;
  cursor:pointer;color:white;width:100%;transition:transform .15s;
  box-shadow:0 5px 16px rgba(0,0,0,.15);}
.win-btn:active{transform:scale(.97);}
.win-btn.dl{background:linear-gradient(135deg,var(--green),var(--dgreen));}
.win-btn.re{background:linear-gradient(135deg,var(--mint),#00838f);}
</style>
</head>
<body>

<!-- leaves -->
<div class="leaf" style="left:5%;top:10%;--ld:3s">🍃</div>
<div class="leaf" style="left:88%;top:15%;--ld:4s;animation-delay:.5s">🌿</div>
<div class="leaf" style="left:15%;top:70%;--ld:5s;animation-delay:1s">🍀</div>
<div class="leaf" style="left:80%;top:65%;--ld:3.5s;animation-delay:2s">🍃</div>
<div class="leaf" style="left:50%;top:5%;--ld:4.5s;animation-delay:1.5s">🌱</div>

<div class="confetti-wrap" id="confetti"></div>

<!-- LEVEL UP -->
<div class="lu-ov" id="luOv">
  <div class="lu-dragon"><svg id="luSvg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"></svg></div>
  <div class="lu-title" id="luTitle">🌟 Super!</div>
  <div class="lu-upgrade" id="luUpgrade">Neues Upgrade!</div>
  <div class="lu-sub" id="luSub">Weiter so!</div>
  <button class="lu-btn" onclick="closeLevelUp()">Weiter! 🐉</button>
</div>

<!-- WIN -->
<div class="win-ov" id="winOv">
  <div class="win-title">🏆 Alle Farben gelernt!</div>
  <div class="diploma-wrap" id="diplomaEl">
    <div class="dip-head">🐉 Farben-Urkunde 🌈</div>
    <div style="font-family:'Nunito',sans-serif;font-weight:700;font-size:.68rem;color:#558b2f">für</div>
    <div class="dip-name" id="dipName">Farben-Profi</div>
    <div class="dip-dragon"><svg id="dipSvg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"></svg></div>
    <div class="dip-text">hat mit Kokosnuss alle Farben gelernt<br>und alle <strong>10 Level</strong> gemeistert! 🐉🌈</div>
    <div class="dip-stats">
      <div><div class="dsv" id="winScore">0</div><div class="dsl">Punkte</div></div>
      <div><div class="dsv" id="winCorrect">0</div><div class="dsl">Richtig</div></div>
    </div>
    <div class="dip-seal">🏆</div>
    <div class="dip-date" id="dipDate"></div>
  </div>
  <div class="win-btns">
    <button class="win-btn dl" onclick="downloadPDF()">📄 Urkunde speichern</button>
    <button class="win-btn re" onclick="restartGame()">🔄 Nochmal spielen</button>
  </div>
</div>

<div class="wrap">
  <div class="header">
    <div class="title">🐉 Kokosnuss</div>
    <div class="subtitle" id="headerSub">Welche Farbe ist das?</div>
  </div>

  <div class="level-dots" id="levelDots"></div>

  <div class="dragon-stage">
    <div class="dragon-wrap" id="dragonWrap">
      <svg id="mainSvg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
    <div class="speech" id="speech">Welche Farbe? 🌈</div>
  </div>

  <div class="upgrade-lbl" id="upgradeLabel">Kokosnuss 🐉</div>

  <div class="progress-wrap">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>

  <div class="question-card">
    <div class="q-label" id="qLabel">Welche Farbe siehst du?</div>
    <div class="obj-display" id="objDisplay"></div>
  </div>

  <div class="color-answers" id="answers"></div>
</div>

<script>
// ═══════════════════════════════════════
//  UPGRADES
// ═══════════════════════════════════════
const UPGRADES=[
  {name:'Kokosnuss 🐉',          desc:'Hallo! Ich bin Kokosnuss!'},
  {name:'Flügel 🪽',             desc:'Kokosnuss kann fliegen!'},
  {name:'Feuer 🔥',              desc:'Kokosnuss spuckt Feuer!'},
  {name:'Ritterrüstung ⚔️',      desc:'Ritter Kokosnuss!'},
  {name:'Zauberstab 🪄',         desc:'Abrakadabra!'},
  {name:'Piratenhut 🏴‍☠️',       desc:'Ahoi! Piraten-Kokosnuss!'},
  {name:'Taucherbrille 🤿',      desc:'Kokosnuss taucht ab!'},
  {name:'Weltraum-Helm 🪐',      desc:'Kokosnuss im Weltall!'},
  {name:'Regenbogen 🌈',         desc:'Kokosnuss leuchtet in allen Farben!'},
  {name:'FARBEN-MEISTER 🏆',     desc:'Du kennst alle Farben! Fantastisch!'},
];

// ── SVG ANIMATIONS ──
const SVG_ANIM=`<defs><style>
  .wings{transform-origin:100px 110px;animation:wingFlap 1.8s ease-in-out infinite;}
  @keyframes wingFlap{0%,100%{transform:scaleY(1)}40%{transform:scaleY(.75)}70%{transform:scaleY(1.08)}}
  .fire{transform-origin:168px 95px;animation:firePulse .4s ease-in-out infinite alternate;}
  @keyframes firePulse{from{transform:scaleY(1) scaleX(1)}to{transform:scaleY(1.4) scaleX(.8)}}
  .fire2{transform-origin:168px 95px;animation:firePulse .25s ease-in-out infinite alternate-reverse;}
  .sword{transform-origin:155px 145px;animation:swordWave 2s ease-in-out infinite alternate;}
  @keyframes swordWave{from{transform:rotate(-8deg)}to{transform:rotate(8deg)}}
  .wand-star{transform-origin:162px 60px;animation:wandSpin 2s linear infinite;}
  @keyframes wandSpin{to{transform:rotate(360deg)}}
  .hat{transform-origin:100px 55px;animation:hatTilt 3s ease-in-out infinite alternate;}
  @keyframes hatTilt{from{transform:rotate(-3deg)}to{transform:rotate(3deg)}}
  .bubble{transform-origin:145px 105px;animation:bubbleWobble 2s ease-in-out infinite alternate;}
  @keyframes bubbleWobble{from{transform:scale(1)}to{transform:scale(1.06)}}
  .helmet{transform-origin:100px 70px;animation:helmBob 2.5s ease-in-out infinite alternate;}
  @keyframes helmBob{from{transform:translateY(0)}to{transform:translateY(-3px)}}
  .rb-arc{animation:rbPulse 2s ease-in-out infinite alternate;}
  @keyframes rbPulse{from{opacity:.7}to{opacity:1}}
  .star-spin{animation:sSpin 3s linear infinite;}
  @keyframes sSpin{to{transform:rotate(360deg)}}
</style></defs>`;

function buildDragon(level){
  const hasWings   = level>=2;
  const hasFire    = level>=3;
  const hasArmor   = level>=4;
  const hasWand    = level>=5;
  const hasPirate  = level>=6;
  const hasGoggles = level>=7;
  const hasHelmet  = level>=8;
  const hasRainbow = level>=9;
  const hasStars   = level>=10;

  let s=SVG_ANIM;

  // rainbow bg
  if(hasRainbow){
    const arcs=[
      {r:92,c:'#e53935',w:13},{r:78,c:'#ff9800',w:11},
      {r:66,c:'#fdd835',w:10},{r:55,c:'#4caf50',w:9},
      {r:45,c:'#1e88e5',w:8},{r:36,c:'#9c27b0',w:7},
    ];
    arcs.forEach(({r,c,w})=>
      s+=`<path class="rb-arc" d="M${100-r} 145 A${r} ${r} 0 0 1 ${100+r} 145" fill="none" stroke="${c}" stroke-width="${w}" stroke-linecap="round"/>`
    );
  }

  // wings (behind body)
  if(hasWings){
    s+=`<g class="wings">`;
    s+=`<path d="M60 112 Q28 88 30 58 Q44 68 46 94 Q60 72 54 42 Q70 54 60 88 Q76 68 74 40 Q88 54 78 88" fill="#a5d6a7" opacity=".9"/>`;
    s+=`<path d="M60 112 Q28 88 30 58 Q44 68 46 94" fill="none" stroke="#66bb6a" stroke-width="1.5"/>`;
    s+=`<path d="M140 112 Q172 88 170 58 Q156 68 154 94 Q140 72 146 42 Q130 54 140 88 Q124 68 126 40 Q112 54 122 88" fill="#a5d6a7" opacity=".9"/>`;
    s+=`<path d="M140 112 Q172 88 170 58 Q156 68 154 94" fill="none" stroke="#66bb6a" stroke-width="1.5"/>`;
    s+=`</g>`;
  }

  // sword
  if(hasArmor){
    s+=`<g class="sword">`;
    // blade
    s+=`<rect x="150" y="100" width="6" height="50" rx="3" fill="#90a4ae"/>`;
    s+=`<polygon points="153,95 148,105 158,105" fill="#78909c"/>`;
    // crossguard
    s+=`<rect x="143" y="130" width="20" height="6" rx="3" fill="#fdd835"/>`;
    // handle
    s+=`<rect x="150" y="136" width="6" height="18" rx="3" fill="#795548"/>`;
    s+=`</g>`;
  }

  // armor overlay (on body)
  const armorOn = hasArmor;

  // fire
  if(hasFire){
    s+=`<ellipse class="fire" cx="168" cy="98" rx="10" ry="18" fill="#ff9800" opacity=".95"/>`;
    s+=`<ellipse class="fire2" cx="168" cy="101" rx="6" ry="12" fill="#fdd835" opacity=".95"/>`;
    s+=`<ellipse cx="168" cy="88" rx="5" ry="8" fill="#ff5722" opacity=".8"/>`;
  }

  // ── BODY ──
  const bodyColor='#66bb6a';
  s+=`<ellipse cx="100" cy="145" rx="48" ry="44" fill="${bodyColor}"/>`;
  if(armorOn){
    // chest plate
    s+=`<ellipse cx="100" cy="145" rx="30" ry="32" fill="#90a4ae" opacity=".7"/>`;
    s+=`<path d="M80 128 Q100 120 120 128 L118 162 Q100 168 82 162 Z" fill="#78909c" opacity=".8"/>`;
    // rivets
    [[88,132],[112,132],[85,148],[115,148]].forEach(([x,y])=>
      s+=`<circle cx="${x}" cy="${y}" r="3" fill="#607d8b"/>`
    );
  } else {
    s+=`<ellipse cx="100" cy="150" rx="28" ry="30" fill="#a5d6a7" opacity=".6"/>`;
  }

  // belly scales
  for(let i=0;i<3;i++){
    s+=`<ellipse cx="100" cy="${130+i*14}" rx="${20-i*3}" ry="7" fill="#81c784" opacity=".5"/>`;
  }

  // tail
  s+=`<path d="M148 150 Q170 140 172 122 Q174 108 162 106 Q150 104 148 118" fill="none" stroke="#66bb6a" stroke-width="9" stroke-linecap="round"/>`;
  s+=`<polygon points="172,118 165,108 178,106" fill="#4caf50"/>`;

  // legs
  s+=`<ellipse cx="74" cy="182" rx="18" ry="10" fill="#4caf50"/>`;
  s+=`<ellipse cx="126" cy="182" rx="18" ry="10" fill="#4caf50"/>`;
  // claws
  [[68,190],[76,192],[84,190]].forEach(([x,y])=>s+=`<ellipse cx="${x}" cy="${y}" rx="4" ry="6" fill="#388e3c" transform="rotate(-10 ${x} ${y})"/>`);
  [[120,190],[128,192],[136,190]].forEach(([x,y])=>s+=`<ellipse cx="${x}" cy="${y}" rx="4" ry="6" fill="#388e3c" transform="rotate(10 ${x} ${y})"/>`);

  // arms

  s+=`<ellipse cx="108" cy="104" rx="3" ry="2.5" fill="#388e3c"/>`;
  // smile
  s+=`<path d="M86 112 Q100 124 114 112" fill="none" stroke="#388e3c" stroke-width="3" stroke-linecap="round"/>`;
  // teeth

  s+=`<rect x="103" y="112" width="7" height="8" rx="2" fill="white"/>`;

  s+=`<circle cx="82" cy="78" r="13" fill="white"/>`;

  s+=`<path d="M110 68 Q118 64 126 68" fill="none" stroke="#2e7d32" stroke-width="2.5" stroke-linecap="round"/>`;

  // cheeks
  s+=`<ellipse cx="68" cy="90" rx="9" ry="6" fill="#a5d6a7" opacity=".5"/>`;
  s+=`<ellipse cx="132" cy="90" rx="9" ry="6" fill="#a5d6a7" opacity=".5"/>`;

  // ears/horns
  s+=`<polygon points="74,52 66,30 84,38" fill="#4caf50"/>`;
  s+=`<polygon points="126,52 134,30 116,38" fill="#4caf50"/>`;
  // small spikes on back
  [60,75,90].forEach((y,i)=>
    s+=`<polygon points="${195-i*5},${y} ${188-i*5},${y-14} ${181-i*5},${y}" fill="#4caf50" opacity=".6"/>`
  );

  // pirate hat
  if(hasPirate){
    s+=`<g class="hat">`;

    s+=`<rect x="70" y="28" width="60" height="32" rx="6" fill="#1a1a2e"/>`;

    s+=`<circle cx="104" cy="40" r="2.5" fill="#1a1a2e"/>`;

    // crossbones
    s+=`<line x1="88" y1="50" x2="112" y2="54" stroke="white" stroke-width="2.5" stroke-linecap="round"/>`;

    s+=`<ellipse cx="118" cy="78" rx="17" ry="15" fill="rgba(33,150,243,.2)" stroke="#1e88e5" stroke-width="3"/>`;
    s+=`<line x1="99" y1="78" x2="101" y2="78" stroke="#1e88e5" stroke-width="3"/>`;
    s+=`<path d="M65 76 Q58 74 56 78" fill="none" stroke="#1e88e5" stroke-width="2.5" stroke-linecap="round"/>`;
    s+=`<path d="M135 76 Q142 74 144 78" fill="none" stroke="#1e88e5" stroke-width="2.5" stroke-linecap="round"/>`;
    s+=`</g>`;
  }

  // space helmet
  if(hasHelmet){
    s+=`<g class="helmet">`;
    s+=`<path d="M54 84 Q52 44 100 40 Q148 44 146 84 L146 96 Q146 120 124 126 Q100 130 76 126 Q54 120 54 96 Z" fill="rgba(144,202,249,.2)" stroke="#42a5f5" stroke-width="2.5"/>`;
    s+=`<path d="M60 68 Q100 52 140 68" fill="none" stroke="rgba(255,255,255,.4)" stroke-width="3" stroke-linecap="round"/>`;
    s+=`<circle cx="55" cy="93" r="5" fill="#42a5f5" opacity=".8"/>`;
    s+=`<circle cx="145" cy="93" r="5" fill="#42a5f5" opacity=".8"/>`;
    s+=`</g>`;
  }

  // wand
  if(hasWand){
    s+=`<line x1="40" y1="148" x2="155" y2="65" stroke="#fdd835" stroke-width="3.5" stroke-linecap="round"/>`;
    s+=`<g class="wand-star" style="transform-origin:155px 65px">`;
    s+=`<path d="M155 56 l2.5 6 l6 0 l-5 3.5 l2 6.5 l-5.5-3.5 l-5.5 3.5 l2-6.5 l-5-3.5 l6 0 z" fill="#fdd835"/>`;
    s+=`<path d="M155 56 l2.5 6 l6 0 l-5 3.5 l2 6.5 l-5.5-3.5 l-5.5 3.5 l2-6.5 l-5-3.5 l6 0 z" fill="white" opacity=".35"/>`;
    s+=`</g>`;
  }

  // win stars
  if(hasStars){
    [[22,22],[178,22],[100,12],[44,54],[156,54]].forEach(([x,y],i)=>{

      s+=`<g class="star-spin" style="transform-origin:${x}px ${y}px;animation-delay:${i*.35}s">`;
      s+=`<path d="M${x} ${y-8} l2 5 l5.5 0 l-4.5 3 l1.8 5.5 l-4.8-3.2 l-4.8 3.2 l1.8-5.5 l-4.5-3 l5.5 0 z" fill="${c}"/>`;
      s+=`</g>`;
    });
  }

  return s;
}

function renderDragon(id,level){
  const el=document.getElementById(id);
  if(el) el.innerHTML=buildDragon(level);
}

// ═══════════════════════════════════════
//  COLOR DATA
// ═══════════════════════════════════════
const COLORS_BASIC=[
  {name:'Rot',    hex:'#e53935', emoji:'🍎'},
  {name:'Blau',   hex:'#1e88e5', emoji:'🫐'},
  {name:'Gelb',   hex:'#fdd835', emoji:'🌟'},
  {name:'Grün',   hex:'#43a047', emoji:'🌿'},
];
const COLORS_MID=[
  {name:'Orange', hex:'#fb8c00', emoji:'🍊'},
  {name:'Lila',   hex:'#8e24aa', emoji:'🍇'},
  {name:'Rosa',   hex:'#e91e8c', emoji:'🌸'},
];
const COLORS_ADV=[
  {name:'Braun',  hex:'#795548', emoji:'🍫'},
  {name:'Schwarz',hex:'#212121', emoji:'🐧'},
  {name:'Weiss',  hex:'#e0e0e0', emoji:'⬜'},
];

// objects per color — varied emoji for variety
const COLOR_OBJECTS={
  'Rot':   ['🍎','🌹','🎈','❤️','🚒'],
  'Blau':  ['🫐','💙','🌊','🐟','☁️'],
  'Gelb':  ['🌟','🍋','🌻','⭐','🐤'],
  'Grün':  ['🌿','🐸','🥦','🍀','🌲'],
  'Orange':['🍊','🦊','🥕','🎃','🌅'],
  'Lila':  ['🍇','💜','🌆','🦄','🔮'],
  'Rosa':  ['🌸','🐷','💗','🎀','🦩'],
  'Braun': ['🍫','🐻','🌰','🍞','🐕'],
  'Schwarz':['🐧','⬛','🐱','🎩','🦇'],
  'Weiss': ['⬜','🤍','☁️','🥛','🐰'],
};

function getColorsForLevel(l){
  if(l<=3) return COLORS_BASIC;
  if(l<=6) return [...COLORS_BASIC,...COLORS_MID];
  return [...COLORS_BASIC,...COLORS_MID,...COLORS_ADV];
}

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

// ═══════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════
let score=0,level=1,answered=false;
let playerName='Farben-Profi';
const QPL=6;
let questionInLevel=0,currentAnswer='',totalCorrect=0;
let lastEmojis={};

const SPEECH_RIGHT=['Super! 🌈','Richtig! 🐉','Toll! 🌟','Ja! ⭐','Wunderbar! ✨','Bravo! 🎉'];
const SPEECH_WRONG=['Nochmal! 💚','Schau nochmal! 🐉','Fast! Nochmal! 🌈','Versuch nochmal! ⭐'];
const SPEECH_ASK=['Welche Farbe? 🌈','Zeig mir die Farbe! 🐉','Was für eine Farbe? ⭐','Such die Farbe! ✨'];

const LEVEL_NAMES=['','Grundfarben','Grundfarben','Grundfarben',
  'Mehr Farben','Mehr Farben','Mehr Farben',
  'Alle Farben','Alle Farben','Alle Farben','Alle Farben'];

function setSpeech(msg){
  const el=document.getElementById('speech');
  el.style.animation='none';el.textContent=msg;
  requestAnimationFrame(()=>el.style.animation='popIn .35s cubic-bezier(.34,1.56,.64,1)');
}

function buildLevelDots(){
  const c=document.getElementById('levelDots');c.innerHTML='';
  for(let i=1;i<=10;i++){
    const d=document.createElement('div');
    d.className='ld'+(i<level?' done':i===level?' active':'');
    c.appendChild(d);
  }
}

function getEmoji(colorName){
  const arr=COLOR_OBJECTS[colorName]||['🎨'];
  // avoid repeating last emoji for this color
  let choices=arr.filter(e=>e!==lastEmojis[colorName]);
  if(!choices.length) choices=arr;
  const pick=choices[Math.floor(Math.random()*choices.length)];
  lastEmojis[colorName]=pick;
  return pick;
}

function nextQuestion(){
  answered=false;
  const allColors=getColorsForLevel(level);
  // pick correct color
  const correct=allColors[Math.floor(Math.random()*allColors.length)];
  currentAnswer=correct.name;

  // pick 3 wrong colors (different from correct)
  const wrong=shuffle(allColors.filter(c=>c.name!==correct.name)).slice(0,3);
  const choices=shuffle([correct,...wrong]);

  // question display — alternate between showing emoji vs swatch
  const showSwatch=Math.random()<.5;
  const display=document.getElementById('objDisplay');
  if(showSwatch){
    // show colored square, ask for color name
    document.getElementById('qLabel').textContent='Welche Farbe ist das?';
    display.innerHTML=`<div class="obj-color-swatch" style="background:${correct.hex}"></div>`;
  } else {
    // show emoji, ask for its color
    const emoji=getEmoji(correct.name);
    document.getElementById('qLabel').textContent='Welche Farbe hat das?';
    display.innerHTML=`<span class="obj-emoji">${emoji}</span>`;
  }

  setSpeech(SPEECH_ASK[Math.floor(Math.random()*SPEECH_ASK.length)]);

  // color buttons
  const cont=document.getElementById('answers');cont.innerHTML='';
  choices.forEach(c=>{
    const btn=document.createElement('button');
    btn.className='color-btn';
    btn.style.background=c.hex==='#e0e0e0'
      ?'linear-gradient(135deg,#e0e0e0,#bdbdbd)'
      :`linear-gradient(135deg,${c.hex},${darken(c.hex)})`;
    btn.innerHTML=`<span class="color-btn-name">${c.name}</span>`;
    btn.onclick=()=>handleAnswer(c.name,btn);
    cont.appendChild(btn);
  });

  document.getElementById('progressFill').style.width=(questionInLevel/QPL*100)+'%';
  buildLevelDots();
}

// simple hex darkener for gradient
function darken(hex){
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.max(0,r-40);g=Math.max(0,g-40);b=Math.max(0,b-40);
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

function handleAnswer(val,btn){
  if(answered)return;answered=true;
  if(val===currentAnswer){
    totalCorrect++;score+=10;questionInLevel++;
    btn.classList.add('correct');
    setSpeech(SPEECH_RIGHT[Math.floor(Math.random()*SPEECH_RIGHT.length)]);
    flashDragon('happy');spawnConfetti(32);
    if(questionInLevel>=QPL)setTimeout(doLevelUp,900);
    else setTimeout(nextQuestion,1100);
  } else {
    btn.classList.add('wrong');
    setSpeech(SPEECH_WRONG[Math.floor(Math.random()*SPEECH_WRONG.length)]);
    flashDragon('sad');
    setTimeout(()=>{btn.classList.remove('wrong');answered=false;},700);
  }
}

function flashDragon(mood){
  const w=document.getElementById('dragonWrap');
  if(mood==='happy'){
    w.style.animation='dragonDance .8s ease-in-out';
    w.style.filter='drop-shadow(0 0 28px rgba(255,215,0,.9))';
    setTimeout(()=>{w.style.animation='dragonFloat 3s ease-in-out infinite';w.style.filter='drop-shadow(0 6px 20px rgba(76,175,80,.35))';},900);
  } else {
    w.style.animation='dragonSad .4s ease';
    w.style.filter='drop-shadow(0 0 16px rgba(239,68,68,.5))';
    setTimeout(()=>{w.style.animation='dragonFloat 3s ease-in-out infinite';w.style.filter='drop-shadow(0 6px 20px rgba(76,175,80,.35))';},500);
  }
}

function doLevelUp(){
  const next=level+1;
  if(next>10){showWin();return;}
  level=next;questionInLevel=0;
  document.getElementById('upgradeLabel').textContent=UPGRADES[level-1].name;
  renderDragon('mainSvg',level);renderDragon('luSvg',level);
  document.getElementById('luTitle').textContent=`🌟 ${UPGRADES[level-1].name}`;
  document.getElementById('luUpgrade').textContent=UPGRADES[level-1].desc;
  document.getElementById('luSub').textContent=`Level ${level} – ${LEVEL_NAMES[level]}`;
  document.getElementById('luOv').classList.add('show');
  spawnConfetti(65);
}
function closeLevelUp(){
  document.getElementById('luOv').classList.remove('show');
  nextQuestion();
}

function showWin(){
  const now=new Date();
  document.getElementById('dipDate').textContent=now.toLocaleDateString('de-CH',{day:'2-digit',month:'long',year:'numeric'});
  document.getElementById('dipName').textContent=playerName;
  document.getElementById('winScore').textContent=score;
  document.getElementById('winCorrect').textContent=totalCorrect;
  renderDragon('dipSvg',10);
  document.getElementById('winOv').classList.add('show');
  spawnConfetti(100);
}

      </div>
      <div style="width:80%;height:2px;background:linear-gradient(90deg,transparent,#a5d6a7,transparent);margin:12px auto"></div>
      <div style="font-family:'Nunito',sans-serif;font-weight:800;font-size:1rem;color:#2e5a2e;line-height:1.8;margin:10px 0">

      </div>
      <div style="display:flex;justify-content:center;gap:14px;margin:16px 0">
        <div style="background:#e8f5e9;border-radius:12px;padding:10px 22px">

        </div>

        </div>

      <div style="width:62px;height:62px;border-radius:50%;background:linear-gradient(135deg,#fdd835,#ff9800);display:flex;align-items:center;justify-content:center;font-size:1.8rem;margin:4px auto 10px;border:3px solid white;box-shadow:0 4px 14px rgba(255,152,0,.4)">🏆</div>
      <div style="font-family:'Nunito',sans-serif;font-weight:700;font-size:.75rem;color:#558b2f;margin-top:8px">${dateStr}</div>

  }catch(e){document.body.removeChild(el);alert('Fehler. Nochmal versuchen.');console.error(e);}

function restartGame(){
  score=0;level=1;answered=false;questionInLevel=0;totalCorrect=0;lastEmojis={};
  document.getElementById('upgradeLabel').textContent=UPGRADES[0].name;
  document.getElementById('progressFill').style.width='0%';
  document.getElementById('winOv').classList.remove('show');
  renderDragon('mainSvg',1);
  nextQuestion();
}

// CONFETTI — rainbow colors!
const CC=['#e53935','#1e88e5','#fdd835','#43a047','#fb8c00','#8e24aa','#e91e8c','#26c6da'];
function spawnConfetti(n=30){
  const w=document.getElementById('confetti');
  for(let i=0;i<n;i++){
    const p=document.createElement('div');p.className='cp';const sz=7+Math.random()*10;
    p.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*12-5}%;width:${sz}px;height:${sz}px;background:${CC[Math.floor(Math.random()*CC.length)]};border-radius:${Math.random()<.4?'50%':'3px'};--fd:${.9+Math.random()*1.4}s;--dl:${Math.random()*.35}s;`;
    w.appendChild(p);setTimeout(()=>p.remove(),2600);
  }
}

// INIT
renderDragon('mainSvg',1);
nextQuestion();
